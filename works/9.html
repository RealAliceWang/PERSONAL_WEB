<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="works.css">

  <script>
  var _hmt = _hmt || [];
  (function() {
    var hm = document.createElement("script");
    hm.src = "https://hm.baidu.com/hm.js?0088a2b2952844dfb00ecf664e7564f1";
    var s = document.getElementsByTagName("script")[0];
    s.parentNode.insertBefore(hm, s);
  })();
  </script>
</head>
<body>
  <a href="../index.html#portfolio" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>返回
  </a>

  <main class="work-main">
    <div class="gallery-img" onclick="openLightbox(this)">
      <img src="../assets/9.png" alt="3D3S 云授权系统">
    </div>
  </main>

  <footer class="work-footer">
    <a href="1.html" class="work-footer-link">
      <div>
        <p class="work-footer-eyebrow">下一个项目</p>
        <p class="work-footer-title">3D3S 工业结构设计软件</p>
      </div>
      <svg class="work-footer-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </footer>

  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox(event)" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    function openLightbox(el){const img=el.querySelector('img');if(!img)return;document.getElementById('lightboxImg').src=img.src;document.getElementById('lightbox').classList.add('active');document.body.style.overflow='hidden'}
    function closeLightbox(e){if(e.target.tagName==='IMG'&&e.target.id==='lightboxImg')return;document.getElementById('lightbox').classList.remove('active');document.body.style.overflow=''}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox(e)});
  </script>
</body>
</html>
