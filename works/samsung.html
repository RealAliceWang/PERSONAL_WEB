<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三星智慧门店管理平台 | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:"class",theme:{extend:{fontFamily:{sans:["Inter","Noto Sans SC","-apple-system","sans-serif"]},colors:{brand:{50:"#eef2ff",100:"#e0e7ff",200:"#c7d2fe",300:"#a5b4fc",400:"#818cf8",500:"#6366f1",600:"#4f46e5",700:"#4338ca"}}}}}</script>
  <script>if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')</script>
  <style>
    body{font-family:Inter,"Noto Sans SC",-apple-system,sans-serif}
    .hero-cover{position:relative;height:70vh;min-height:420px;overflow:hidden}
    .hero-cover img{width:100%;height:100%;object-fit:cover;object-position:top}
    .hero-cover::after{content:'';position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.7) 0%,rgba(0,0,0,.15) 35%,rgba(0,0,0,.02) 100%)}
    .hero-info{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:0 clamp(20px,5vw,80px) 40px}
    .gallery-img{border-radius:12px;overflow:hidden;cursor:zoom-in;transition:transform .35s cubic-bezier(.2,.8,.2,1),box-shadow .35s ease}
    .gallery-img:hover{transform:translateY(-4px);box-shadow:0 24px 60px rgba(0,0,0,.15)}
    .dark .gallery-img:hover{box-shadow:0 24px 60px rgba(0,0,0,.5)}
    .gallery-img img{width:100%;display:block}
    .lightbox{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);opacity:0;pointer-events:none;transition:opacity .3s ease;cursor:zoom-out}
    .lightbox.active{opacity:1;pointer-events:all}
    .lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:8px;transform:scale(.95);transition:transform .35s cubic-bezier(.2,.8,.2,1)}
    .lightbox.active img{transform:scale(1)}
    .lightbox-close{position:absolute;top:20px;right:20px;width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.08);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .2s}
    .lightbox-close:hover{background:rgba(255,255,255,.15)}
    [data-reveal]{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.4,0,.2,1),transform .7s cubic-bezier(.4,0,.2,1)}
    [data-reveal].on{opacity:1;transform:none}
    @media(max-width:640px){.hero-cover{height:50vh;min-height:300px}}
  </style>
</head>
<body class="bg-white text-slate-900 dark:bg-[#050508] dark:text-slate-100">
  <a href="../index.html#portfolio" class="fixed left-5 top-5 z-50 flex items-center gap-1.5 rounded-full border border-white/15 bg-black/30 px-4 py-2 text-xs font-medium text-white backdrop-blur-md transition hover:bg-black/50">
    <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>返回
  </a>
  <span class="fixed right-5 top-5 z-50 rounded-full border border-white/15 bg-black/30 px-4 py-2 text-xs font-semibold tracking-widest text-white/60 backdrop-blur-md">03 / 08</span>

  <section class="hero-cover">
    <img src="../assets/三星智慧门店管理平台作品集@1x.jpg" alt="三星智慧门店管理平台">
    <div class="hero-info">
      <div class="mb-3 flex flex-wrap gap-2">
        <span class="rounded-full border border-white/20 bg-white/10 px-3 py-1 text-[11px] font-medium text-white/80 backdrop-blur-sm">数据可视化</span>
        <span class="rounded-full border border-white/20 bg-white/10 px-3 py-1 text-[11px] font-medium text-white/80 backdrop-blur-sm">B 端平台</span>
        <span class="rounded-full border border-white/20 bg-white/10 px-3 py-1 text-[11px] font-medium text-white/80 backdrop-blur-sm">企业服务</span>
      </div>
      <h1 class="text-3xl font-bold tracking-tight text-white sm:text-5xl">三星智慧门店管理平台</h1>
    </div>
  </section>

  <main class="mx-auto max-w-6xl px-5 py-16 sm:px-8 lg:py-24">
    <div class="space-y-8" data-reveal>
      <div class="gallery-img" onclick="openLightbox(this)">
        <img src="../assets/三星智慧门店管理平台作品集@1x.jpg" alt="三星智慧门店管理平台">
      </div>
    </div>
  </main>

  <footer class="border-t border-slate-200 dark:border-white/[0.04]">
    <a href="datavis.html" class="group flex items-center justify-between px-5 py-10 transition hover:bg-slate-50 dark:hover:bg-white/[0.02] sm:px-8">
      <div>
        <p class="text-xs font-semibold uppercase tracking-[4px] text-slate-400">下一个项目</p>
        <p class="mt-2 text-xl font-bold sm:text-2xl">数据可视化作品合集</p>
      </div>
      <svg class="h-6 w-6 text-slate-400 transition group-hover:translate-x-1 group-hover:text-brand-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </footer>

  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox(event)" aria-label="Close">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    const io=new IntersectionObserver(e=>{e.forEach(e=>{e.isIntersecting&&(e.target.classList.add('on'),io.unobserve(e.target))})},{threshold:.1});
    document.querySelectorAll('[data-reveal]').forEach(el=>io.observe(el));
    function openLightbox(el){const img=el.querySelector('img');if(!img)return;document.getElementById('lightboxImg').src=img.src;document.getElementById('lightbox').classList.add('active');document.body.style.overflow='hidden'}
    function closeLightbox(e){if(e.target.tagName==='IMG'&&e.target.id==='lightboxImg')return;document.getElementById('lightbox').classList.remove('active');document.body.style.overflow=''}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox(e)});
  </script>
</body>
</html>
